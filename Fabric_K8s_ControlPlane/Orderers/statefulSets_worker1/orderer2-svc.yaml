kind: Service
apiVersion: v1
metadata:
    name: orderer2
    labels:
        run: orderer2
spec:
    selector:
        name: orderer2
    type: ClusterIP
    ports:
        - protocol: TCP
          port: 7050
          name: grpc
---
#---------------- Orderer2 Metrics Service ---------------
apiVersion: v1
kind: Service
metadata:
  labels:
    app: orderer2
    component: orderer
    metrics-service: "true"
  name: orderer2-metrics
spec:
  type: ClusterIP
  ports:
  - name: "orderer-metrics"
    port: 9432
    targetPort: 9432
  selector:
    name: orderer2